# newsbox 一期信源种子清单
#
# 重要：本文件是 ``src/newsbox/data/sources.seed.yaml`` 的对外可读镜像（s6-distribution-package
# 引入）。CLI 实际通过 importlib.resources 读 package data；改动**任意一份**后必须用
# `cp docs/sources.seed.yaml src/newsbox/data/` 同步另一份，否则发布版与开发版会漂移。
# 后续 sprint 计划统一为单一来源。
#
# 用途：``newsbox setup`` / ``newsbox sources seed`` 时由 ``seed_sources()`` 读取，
# 拷贝到 ``~/.newsbox/sources.yaml``
# 来源：docs/需求描述和调研.md §信源梳理
#
# ───────────────────────────────────────────────
# 顶层 2 类（s2-1-collector-extract Step 4 收敛后）：
#   rss : feedparser 兜底（含 RSS 2.0 / Atom / GitHub releases.atom / RSSHub Twitter / Reddit .rss）
#   web : trafilatura + Jina 兜底（默认列表两级模式；mode=changelog_page 走单页持续追加切段）
#
# tier 取值（决定 source_bonus 与聚类主条挑选权重）：
#   official_first_party : +5 评分加成 / +10 主条权重（厂商一手）
#   kol                  :  0 评分加成 / +5  主条权重（KOL/创始人/记者）
#   secondary            : -5 评分加成 /  0  主条权重（聚合站/二手）
#
# domain 字段：一期统一 [ai]（按 D5 决策；将来跨领域时再按条目精化）
#
# enabled 缺省 true；标 false 表示种子写入 ~/.newsbox/sources.yaml 后默认关闭，需用户手工开启
# ───────────────────────────────────────────────

# ============================================================
# rss 类（45 条）：X / Reddit / 厂商 RSS / status / 社区聚合 / GitHub release atom
# X 走 RSSHub localhost:1200/twitter/user/{handle}?format=atom（设计 §3.2 + 调研背景 §RSSHub）
# Reddit 走 reddit 原生 .rss
# GitHub release atom 直拉 releases.atom（feedparser 抹平 RSS / Atom 差异）
# ============================================================
rss:
  # ───── X / KOL / 创始人 / 名人（20 条）─────

  # ───── Reddit 板块（4 条，reddit 原生 .rss，免登录）─────
  - id: r_localllama
    url: "https://www.reddit.com/r/LocalLLaMA/.rss"
    tier: secondary
    domain: [ai]
    # 开源 LLM / 本地推理生态
  - id: r_claudecode
    url: "https://www.reddit.com/r/ClaudeCode/.rss"
    tier: secondary
    domain: [ai]
    # Claude Code 用户社区
  - id: r_claudeai
    url: "https://www.reddit.com/r/ClaudeAI/.rss"
    tier: secondary
    domain: [ai]
    # Claude 产品用户社区
  - id: r_codex
    url: "https://www.reddit.com/r/codex/.rss"
    tier: secondary
    domain: [ai]
    # OpenAI Codex 用户社区

  # ───── newsletter（2 条）─────
  - id: latent_space
    url: "https://www.latent.space/feed"
    tier: kol
    domain: [ai]
    # swyx 主理的 AI 工程 newsletter
  - id: pragmatic_engineer
    url: "https://newsletter.pragmaticengineer.com/feed"
    tier: kol
    domain: [ai]
    # Gergely Orosz 的工程实践 newsletter

  # ───── 厂商博客（4 条）─────
  - id: openai_news
    url: "https://openai.com/news/rss.xml"
    tier: official_first_party
    domain: [ai]
    # OpenAI 官方新闻（含模型发布 / 研究报告 / 产品发布）
    # 注：旧路径 /blog/rss.xml 已 307 → /news/rss.xml
  - id: google_gemini_blog
    url: "https://blog.google/products-and-platforms/products/gemini/rss/"
    tier: official_first_party
    domain: [ai]
    # Gemini 官方博客
    # 注：旧路径 /products/gemini/rss/ 已 301 → 新路径
  - id: google_deepmind_blog
    url: "https://deepmind.google/blog/rss.xml"
    tier: official_first_party
    domain: [ai]
    # Google DeepMind 研究博客
  - id: huggingface_blog
    url: "https://huggingface.co/blog/feed.xml"
    tier: official_first_party
    domain: [ai]
    # HuggingFace 官方博客（英文）
    # 注：中文版 /blog/zh/feed.xml 不存在；英文 feed 含原 zh 前缀文章，靠二筛翻译

  # ───── 厂商 status 页（2 条，statuspage.io 标准 atom）─────
  - id: openai_status
    url: "https://status.openai.com/history.atom"
    tier: official_first_party
    domain: [ai]
    # OpenAI 服务可用性历史
  - id: anthropic_status
    url: "https://anthropic.statuspage.io/history.atom"
    tier: official_first_party
    domain: [ai]
    # Anthropic 服务可用性历史

  # ───── 社区聚合（3 条）─────
  - id: hacker_news
    url: "https://hnrss.org/frontpage"
    tier: secondary
    domain: [ai]
    # HN 首页（hnrss.org 第三方 RSS 服务）
    # 决策 D3：用 frontpage 而非 q=AI 主题搜索，避免漏掉无字面 AI 但实质是 AI 的内容
  - id: dev_to_ai
    url: "https://dev.to/feed/tag/ai"
    tier: secondary
    domain: [ai]
    # dev.to AI tag 预筛 feed（量级可控）
  - id: infoq
    url: "https://feed.infoq.com"
    tier: secondary
    domain: [ai]
    enabled: false
    # 决策 D3：全站聚合无预筛，量大噪音多，MVP 默认关闭，跑稳后再开
    notes: "全站 feed，量大；如开启需评估初筛承载力"

  # ───── GitHub Release atom（4 条，feedparser 抹平 RSS / Atom 差异）─────
  - id: claude_code_release
    url: "https://github.com/anthropics/claude-code/releases.atom"
    tier: official_first_party
    domain: [ai]
    # Claude Code CLI / IDE / 插件 / agent 功能 release
  - id: transformers_release
    url: "https://github.com/huggingface/transformers/releases.atom"
    tier: official_first_party
    domain: [ai]
    # HuggingFace transformers release（开源模型生态雷达）
  - id: hermes_agent_release
    url: "https://github.com/NousResearch/hermes-agent/releases.atom"
    tier: official_first_party
    domain: [ai]
    # Nous Research hermes-agent release
  - id: openclaw_release
    url: "https://github.com/openclaw/openclaw/releases.atom"
    tier: official_first_party
    domain: [ai]
    # openclaw release

  # ───── RSSHub 厂商博客 / changelog（3 条，s2-collector-resilience Step 1 从 web 段迁入）─────
  # 用 RSSHub 现成路由替代自家 web adapter：结构化解析 + 容器内绕反爬，比 selector=auto 启发式稳健
  - id: anthropic_news
    url: "http://localhost:1200/anthropic/news"
    tier: official_first_party
    domain: [ai]
    # Anthropic 官方新闻（RSSHub /anthropic/news：抽 SPA self.__next_f.push 结构化数据）
  - id: anthropic_research
    url: "http://localhost:1200/anthropic/research"
    tier: official_first_party
    domain: [ai]
    # Anthropic 研究博客（RSSHub /anthropic/research：同样抽 SPA 结构化数据，实测 20 条 1.5s）
  - id: chatgpt_release_notes
    url: "http://localhost:1200/openai/chatgpt/release-notes"
    tier: official_first_party
    domain: [ai]
    # ChatGPT release notes（RSSHub /openai/chatgpt/release-notes：cheerio + h1 切段，容器内绕 help.openai.com 403）

# ============================================================
# web 类（4 条）：trafilatura + Jina 兜底
# - mode: changelog_page 单页持续追加（按日期标题切段，见设计方案 §3.6）
# - 默认列表两级模式（selector=auto）当前无活跃信源，保留作未来兜底
# - s2-collector-resilience Step 1：anthropic_news/research + chatgpt_release_notes 已迁 RSSHub（见上方 rss 段）
# ============================================================
web:
  # ───── changelog_page 单页持续追加（4 条）─────
  # 三层兜底链：markdown_url → Jina Reader → fail-skip（见设计方案 §3.6）
  - id: claude_api_release_notes
    mode: changelog_page
    url: "https://platform.claude.com/docs/en/release-notes/overview"
    markdown_url: "https://platform.claude.com/docs/en/release-notes/overview.md"
    tier: official_first_party
    domain: [ai]
    # Claude API 更新日志（Mintlify 文档站，提供原生 .md 端点最稳）
  - id: claude_product_release_notes
    mode: changelog_page
    url: "https://support.claude.com/en/articles/12138966-release-notes"
    tier: official_first_party
    domain: [ai]
    # Claude 产品 release notes（Intercom Help Center 单篇文章，Jina Reader 路径）
  - id: gemini_api_changelog
    mode: changelog_page
    url: "https://ai.google.dev/gemini-api/docs/changelog"
    markdown_url: "https://ai.google.dev/gemini-api/docs/changelog.md.txt"
    tier: official_first_party
    domain: [ai]
    # Gemini API changelog（s2 Step 2：上游有原生 .md.txt 端点，41KB 多日条目，## Month D, YYYY 切段）
  - id: openai_api_changelog
    mode: changelog_page
    url: "https://developers.openai.com/api/docs/changelog"
    tier: official_first_party
    domain: [ai]
    enabled: false
    # 决策 D5：纯 SPA 客户端渲染，markdown_url / Jina Reader 都拿不到正文
    # MVP 默认关闭；OpenAI 产品级更新通过 chatgpt_release_notes + openai_news 已覆盖
    # 后续若引入 playwright 兜底再启用
    notes: "SPA 渲染，待 playwright 兜底引入或 OpenAI 提供 .md 端点"
