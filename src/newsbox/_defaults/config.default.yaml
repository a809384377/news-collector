fetch:
  default_since: 24h
  per_source_rate_limit_seconds:
    rss: 1
    web: 2
  # 同类型并发度（s2-collector-resilience Step 4）：rss 8 路并发保护 RSSHub
  # 容器 + X token 限速；web 永远串行（爬虫友好，1 即可）。命令行 --concurrency
  # 仅覆盖 rss 桶，web 桶始终串行
  concurrency:
    rss: 8
    web: 1
  http_retry:
    max_attempts: 4
    backoff_base_seconds: 1   # 1, 2, 4, 8
  consecutive_failure_skip: 3

logging:
  level: info
  file: ~/.newsbox/logs/newsbox.log
  rotation: daily
  retention_days: 30

# CLI 查询命令的调用量软阻断阈值（s9 Step 3 / D4）
# read 命令在 COUNT 预估 > cli_read_warn 时 stderr warn + 软阻断；
# --yes / --json 可跳过；超阈值建议改用 SDK 流式读
thresholds:
  cli_read_warn: 10000
