fetch:
  default_since: 24h
  per_source_rate_limit_seconds:
    rss: 1
    web: 2
    twikit: 2                  # adapter 内部 page-level sleep 2s，外层不再叠加
  # 同类型并发度（s2-collector-resilience Step 4 + s10 加 twikit）：
  #   rss    8 路并发保护 RSSHub 容器 + token 限速
  #   web    永远串行（爬虫友好，1 即可）
  #   twikit 必须串行；并发会触发 X 风控（cookie 来源单一 IP）
  # 命令行 --concurrency 仅覆盖 rss 桶，其他桶按本配置
  concurrency:
    rss: 8
    web: 1
    twikit: 1
  # twikit 专属：单源单次 fetch 翻页上限（X 不支持原生 since_id，按 created_at
  # 倒序翻到窗外即停；max_pages 是防 since 写错穷举翻页的硬上限，~5 页 × 40 条 = 200 条）
  twikit:
    max_pages: 5
  # reddit 富化（s13）：rss adapter 抓回 feed 后对每条 reddit 帖子追加一次 `.json` 请求拿评论 + score / flair
  # rate_limit_seconds: 富化每帖间隔（reddit 无 OAuth 限 10 QPM；6s 保守留 buffer）
  # top_comments:       每帖入库的顶层评论数（按 score desc + 过滤 bot/[deleted]）
  # enabled=false 退回原生 RSS 路径（body 不重写、评论不入库）
  reddit_enrich:
    enabled: true
    rate_limit_seconds: 6.0
    top_comments: 5
  http_retry:
    max_attempts: 4
    backoff_base_seconds: 1   # 1, 2, 4, 8
  consecutive_failure_skip: 3

logging:
  level: info
  file: ~/.newsbox/logs/newsbox.log
  rotation: daily
  retention_days: 30

# CLI 查询命令的调用量软阻断阈值（s9 Step 3 / D4）
# read 命令在 COUNT 预估 > cli_read_warn 时 stderr warn + 软阻断；
# --yes / --json 可跳过；超阈值建议改用 SDK 流式读
thresholds:
  cli_read_warn: 10000
