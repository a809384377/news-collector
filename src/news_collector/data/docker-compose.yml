services:
  rsshub:
    image: diygod/rsshub:latest
    container_name: news-collector-rsshub
    restart: unless-stopped
    # 仅本机访问，不暴露公网
    ports:
      - "127.0.0.1:1200:1200"
    environment:
      NODE_ENV: production
      CACHE_TYPE: redis
      REDIS_URL: redis://redis:6379/
      # 关闭 puppeteer / browserless（D3：不维护重容器，纯 cookie 模式即可）
      PUPPETEER_WS_ENDPOINT: ""
      # 本机使用，关闭访问控制
      ACCESS_KEY: ""
      LOGGER_LEVEL: info
    env_file:
      # 从用户运行时目录读取 TWITTER_AUTH_TOKEN（参见 docs/rsshub-setup.md §3）
      - ${HOME}/.news-collector/.env
    depends_on:
      - redis
    networks:
      - rsshub_net

  redis:
    image: redis:alpine
    container_name: news-collector-redis
    restart: unless-stopped
    volumes:
      - ${HOME}/.news-collector/rsshub/redis-data:/data
    networks:
      - rsshub_net

networks:
  rsshub_net:
    driver: bridge
